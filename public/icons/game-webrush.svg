<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5a7fd0"/><stop offset="1" stop-color="#e07a8a"/></linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#sky)"/>
  <!-- skyline silhouette -->
  <g fill="#1a2138">
    <rect x="20" y="240" width="60" height="272"/>
    <rect x="92" y="180" width="52" height="332"/>
    <rect x="156" y="300" width="46" height="212"/>
    <rect x="330" y="150" width="58" height="362"/>
    <rect x="398" y="250" width="50" height="262"/>
    <rect x="456" y="300" width="44" height="212"/>
  </g>
  <g fill="#2b3450">
    <rect x="214" y="120" width="70" height="392"/>
  </g>
  <!-- lit windows -->
  <g fill="#ffe38a" opacity="0.85">
    <rect x="230" y="150" width="10" height="12"/><rect x="248" y="150" width="10" height="12"/><rect x="266" y="150" width="10" height="12"/>
    <rect x="230" y="185" width="10" height="12"/><rect x="266" y="185" width="10" height="12"/>
    <rect x="344" y="180" width="10" height="12"/><rect x="362" y="180" width="10" height="12"/>
    <rect x="106" y="210" width="10" height="12"/><rect x="124" y="210" width="10" height="12"/>
  </g>
  <!-- web line -->
  <path d="M60 90 Q250 210 470 70" stroke="#ffffff" stroke-width="4" fill="none" opacity="0.9"/>
  <!-- swinging hero -->
  <g transform="translate(250 220) rotate(18)">
    <ellipse cx="0" cy="26" rx="14" ry="26" fill="#d1232f"/>
    <circle cx="0" cy="-6" r="15" fill="#c01d2a"/>
    <circle cx="-5" cy="-8" r="5" fill="#fff"/><circle cx="6" cy="-8" r="5" fill="#fff"/>
    <rect x="-20" y="-2" width="16" height="7" rx="3" fill="#1a3a8a" transform="rotate(-40 -12 1)"/>
    <rect x="4" y="-2" width="26" height="7" rx="3" fill="#1a3a8a" transform="rotate(-58 17 1)"/>
    <rect x="-6" y="44" width="7" height="24" rx="3" fill="#1a3a8a"/><rect x="4" y="44" width="7" height="24" rx="3" fill="#1a3a8a"/>
  </g>
</svg>
