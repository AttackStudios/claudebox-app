<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="cbBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1aa0ff"/>
      <stop offset="1" stop-color="#0a6fe0"/>
    </linearGradient>
    <linearGradient id="cbTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9f2ff"/>
    </linearGradient>
    <radialGradient id="cbGloss" cx="0.28" cy="0.2" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- full-bleed brand tile (OS rounds the corners) -->
  <rect width="512" height="512" fill="url(#cbBg)"/>
  <rect width="512" height="512" fill="url(#cbGloss)"/>
  <!-- soft shadow under the box -->
  <ellipse cx="256" cy="416" rx="122" ry="22" fill="#063a78" opacity="0.55"/>
  <!-- isometric "box" cube -->
  <polygon points="256,116 380,186 256,256 132,186" fill="url(#cbTop)"/>
  <polygon points="132,186 256,256 256,396 132,326" fill="#d3e3fb"/>
  <polygon points="380,186 256,256 256,396 380,326" fill="#aecbf1"/>
  <!-- crisp top-edge highlight -->
  <polyline points="132,186 256,116 380,186" fill="none" stroke="#ffffff" stroke-width="4" stroke-linejoin="round" opacity="0.9"/>
  <!-- subtle vertical seam for depth -->
  <line x1="256" y1="256" x2="256" y2="396" stroke="#8fb2e6" stroke-width="3" opacity="0.6"/>
</svg>
