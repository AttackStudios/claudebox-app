<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3fc0ee"/>
      <stop offset="1" stop-color="#1577ad"/>
    </linearGradient>
    <linearGradient id="infl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fd84f"/>
      <stop offset="1" stop-color="#3f9c2a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#water)"/>
  <!-- ripples -->
  <g fill="none" stroke="#bfeeff" stroke-width="6" opacity="0.5" stroke-linecap="round">
    <path d="M60 150 q24 -18 48 0 t48 0"/>
    <path d="M360 110 q24 -18 48 0 t48 0"/>
    <path d="M70 430 q24 -18 48 0 t48 0"/>
  </g>
  <!-- inflatable platform -->
  <rect x="96" y="250" width="320" height="120" rx="40" fill="#1f5fae"/>
  <rect x="110" y="244" width="292" height="96" rx="34" fill="url(#infl)"/>
  <rect x="138" y="262" width="236" height="58" rx="24" fill="#163b6b"/>
  <!-- yellow blast/slide wedge -->
  <path d="M300 250 q70 -8 92 60 l-92 0 z" fill="#f2c20c"/>
  <!-- bouncing figure -->
  <g transform="translate(196 150)">
    <circle cx="0" cy="0" r="30" fill="#ffd9b0"/>
    <rect x="-26" y="28" width="52" height="62" rx="22" fill="#ff5a3c"/>
    <rect x="-34" y="36" width="20" height="48" rx="10" fill="#ffd9b0" transform="rotate(-28 -24 60)"/>
    <rect x="14" y="36" width="20" height="48" rx="10" fill="#ffd9b0" transform="rotate(28 24 60)"/>
  </g>
  <!-- splash mark -->
  <g fill="#eafcff">
    <path d="M150 392 q10 -34 22 0 q-12 -8 -22 0z"/>
    <circle cx="186" cy="384" r="7"/>
    <circle cx="206" cy="396" r="5"/>
  </g>
</svg>
