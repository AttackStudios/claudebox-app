<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff7a3a"/>
      <stop offset="0.5" stop-color="#8a3ad0"/>
      <stop offset="1" stop-color="#1a1150"/>
    </linearGradient>
    <radialGradient id="fireG" cx="0.5" cy="0.4" r="0.6"><stop offset="0" stop-color="#ffd08a"/><stop offset="1" stop-color="#ff4a1e"/></radialGradient>
    <radialGradient id="waterG" cx="0.5" cy="0.4" r="0.6"><stop offset="0" stop-color="#9fd8ff"/><stop offset="1" stop-color="#1a76e0"/></radialGradient>
    <radialGradient id="earthG" cx="0.5" cy="0.4" r="0.6"><stop offset="0" stop-color="#d6b184"/><stop offset="1" stop-color="#8a5a2a"/></radialGradient>
    <radialGradient id="airG" cx="0.5" cy="0.4" r="0.6"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#9fd0e8"/></radialGradient>
    <radialGradient id="lightG" cx="0.5" cy="0.4" r="0.6"><stop offset="0" stop-color="#fff6b0"/><stop offset="1" stop-color="#f0c020"/></radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="7"/></filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- ground podium -->
  <ellipse cx="256" cy="430" rx="180" ry="42" fill="#000" opacity="0.28"/>
  <ellipse cx="256" cy="418" rx="150" ry="34" fill="#2a2160" opacity="0.9"/>
  <ellipse cx="256" cy="416" rx="150" ry="34" fill="none" stroke="#7f8cff" stroke-width="3" opacity="0.8"/>
  <!-- glows -->
  <g opacity="0.85" filter="url(#soft)">
    <circle cx="150" cy="150" r="52" fill="url(#fireG)"/>
    <circle cx="366" cy="140" r="48" fill="url(#waterG)"/>
    <circle cx="120" cy="300" r="40" fill="url(#earthG)"/>
    <circle cx="392" cy="296" r="40" fill="url(#airG)"/>
    <circle cx="256" cy="222" r="64" fill="url(#lightG)"/>
  </g>
  <!-- orbs -->
  <circle cx="150" cy="150" r="40" fill="url(#fireG)" stroke="#fff" stroke-opacity="0.5" stroke-width="2"/>
  <circle cx="366" cy="140" r="36" fill="url(#waterG)" stroke="#fff" stroke-opacity="0.5" stroke-width="2"/>
  <circle cx="120" cy="300" r="30" fill="url(#earthG)" stroke="#fff" stroke-opacity="0.5" stroke-width="2"/>
  <circle cx="392" cy="296" r="30" fill="url(#airG)" stroke="#fff" stroke-opacity="0.5" stroke-width="2"/>
  <!-- central lightning bolt -->
  <path d="M270 168 L232 250 L262 250 L242 316 L300 224 L268 224 Z" fill="#fff6b0" stroke="#f0c020" stroke-width="3" stroke-linejoin="round"/>
  <!-- emoji-ish sparks -->
  <g fill="#fff" opacity="0.9">
    <circle cx="210" cy="360" r="4"/><circle cx="320" cy="352" r="5"/><circle cx="256" cy="380" r="3"/>
  </g>
</svg>
