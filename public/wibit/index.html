<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1aa0d8">
<title>Wibit Simulator — ClaudeBox</title>
<link rel="stylesheet" href="/wibit/css/wibit.css">
<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
<script type="importmap">
  { "imports": { "three": "/vendor/three.module.js" } }
</script>
</head>
<body>
<canvas id="game-canvas"></canvas>

<div id="loading">
  <div class="load-card">
    <div class="load-logo">🏊</div>
    <h1>Wibit Simulator</h1>
    <p id="load-status">Inflating the water park…</p>
  </div>
</div>

<div id="hud" class="hidden">
  <!-- round banner -->
  <div id="round-banner">
    <div id="round-phase">Free Roam</div>
    <div id="round-sub"></div>
  </div>

  <!-- contextual action hint (changes per obstacle) -->
  <div id="action-hint" class="hidden"></div>

  <!-- mobile controls -->
  <div id="move-cluster" class="hidden">
    <div id="joystick-zone"><div id="joystick-base"><div id="joystick-knob"></div></div></div>
    <button id="btn-jump" class="move-btn">⬆️</button>
  </div>

  <button id="reset-btn" class="round-btn" title="Back to the dock">🏖️</button>

  <div id="chat-log"></div>
  <div id="chat-input-row" class="hidden">
    <input id="chat-input" maxlength="160" placeholder="Say something…" autocomplete="off">
    <button id="chat-send">➤</button>
  </div>

  <div id="wb-toasts"></div>

  <!-- big round overlays -->
  <div id="swim-veil" class="hidden"><span>💦</span><p>Splash! Swim to an edge and climb out.</p></div>
  <div id="out-veil" class="hidden"><span>🌊</span><p>You're OUT!</p><small>Wait for the next round…</small></div>
  <div id="win-veil" class="hidden"><span>🏆</span><p id="win-text">You won the Wipeout!</p></div>
</div>

<script src="/js/claudebox.js"></script>
<script type="module" src="/js/voice.js"></script>
<script type="module" src="/wibit/js/main.js"></script>
</body>
</html>
