<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#161a22">
<title>Pizza Works — ClaudeBox</title>
<link rel="icon" href="/icons/icon.svg">
<link rel="stylesheet" href="/pizza/css/pizza.css">
<script type="importmap">{ "imports": { "three": "/vendor/three.module.js" } }</script>
</head>
<body>
<canvas id="game-canvas"></canvas>

<!-- top: cash + job -->
<div id="topbar">
  <div class="chip" id="cash-chip">💵 <b id="cash">0</b></div>
  <div class="chip" id="job-chip">💁 Cashier</div>
</div>

<!-- interact prompt -->
<div id="prompt" class="hidden"><b id="prompt-label"></b><span>Press <kbd>E</kbd></span></div>

<!-- order ticket board (Tab) -->
<div id="tickets" class="hidden">
  <h3>📋 Ticket Board</h3>
  <div id="ticket-list"></div>
</div>

<div id="pz-toasts"></div>

<!-- chat -->
<div id="chat">
  <div id="chat-log"></div>
  <input id="chat-input" class="hidden" maxlength="140" placeholder="Say something… (Enter)" autocomplete="off">
</div>

<div id="hint-bar">WASD move · <b>E</b> interact · <b>Tab</b> tickets · Enter chat · drag to look</div>

<!-- mobile -->
<div id="move-cluster" class="hidden">
  <div id="joystick-zone"><div id="joystick-base"><div id="joystick-knob"></div></div></div>
</div>
<button id="btn-action" class="hidden">👋</button>
<button id="btn-chat" class="hidden">💬</button>

<div id="loading"><div class="spinner"></div><p>Firing up the ovens…</p></div>

<script src="/js/claudebox.js"></script>
<script type="module" src="/pizza/js/main.js"></script>
</body>
</html>
